<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Feed</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">SocialFeed</h1>
            <nav class="nav">
                <button class="nav-btn">Aura</button>
                <button class="nav-btn">Vibe</button>
                <button class="nav-btn">Alerts</button>
            </nav>
        </div>
    </header>
    <main class="main">
        <div class="container">
            <section class="feed">
                <article class="post">
                    <div class="post-header">
                        <img src="https://via.placeholder.com/50x50?text=Avatar" alt="Avatar" class="avatar">
                        <div class="user-info">
                            <h2 class="username">Nyx</h2>
                            <span class="timestamp">12h</span>
                        </div>
                    </div>
                    <p class="post-content">Obsidian steed traverses midnight vault. Glow pulses aft horizon.</p>
                    <img src="images/black-horse.jpg" alt="Obsidian steed frame" class="post-image">
                    <div class="post-actions">
                        <button class="action-btn like-btn">❤️</button>
                        <button class="action-btn">💬</button>
                        <button class="action-btn">🔗</button>
                    </div>
                </article>
                <article class="post">
                    <div class="post-header">
                        <img src="https://via.placeholder.com/50x50?text=Avatar" alt="Avatar" class="avatar">
                        <div class="user-info">
                            <h2 class="username">Kairo</h2>
                            <span class="timestamp">18h</span>
                        </div>
                    </div>
                    <p class="post-content">Quartz skyline pierces neon haze. Echoes waft atop vibrant pulse.</p>
                    <img src="https://via.placeholder.com/600x400?text=Scene+Glow" alt="Neon skyline frame" class="post-image">
                    <div class="post-actions">
                        <button class="action-btn like-btn">❤️</button>
                        <button class="action-btn">💬</button>
                        <button class="action-btn">🔗</button>
                    </div>
                </article>
            </section>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <p>© 2026 SocialFeed. Remain tuned.</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
